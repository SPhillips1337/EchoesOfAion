version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: echoes-db
    restart: always
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-echoes_of_aion}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: echoes-server
    restart: always
    environment:
      - PG_HOST=db
      - PG_PORT=5432
      - PG_USER=${PG_USER:-postgres}
      - PG_PASSWORD=${PG_PASSWORD:-postgres}
      - PG_DATABASE=${PG_DATABASE:-echoes_of_aion}
      - PORT=3000
    ports:
      - "3333:3000"
    depends_on:
      - db

volumes:
  postgres_data:
