<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echoes of Aion - Galactic Conquest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>Echoes of Aion</h1>
            <div class="header-info">
                <span id="turnDisplay">Turn: 1</span>
                <span id="empireDisplay">Empire: Player</span>
            </div>
        </header>

        <div class="game-setup" id="gameSetup">
            <h2>Create New Game</h2>
            <form id="createGameForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Game Name:</label>
                        <input type="text" id="gameName" value="My Galaxy" required>
                    </div>
                    <div class="form-group">
                        <label>Star Systems:</label>
                        <input type="number" id="starCount" value="8" min="4" max="20">
                    </div>
                    <div class="form-group">
                        <label>Empires:</label>
                        <input type="number" id="empireCount" value="3" min="2" max="8">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Empire Name:</label>
                        <input type="text" id="playerEmpireName" value="Human Empire">
                    </div>
                    <div class="form-group">
                        <label>Color:</label>
                        <select id="playerColor">
                            <option value="red">Red</option>
                            <option value="blue">Blue</option>
                            <option value="green">Green</option>
                            <option value="yellow">Yellow</option>
                            <option value="purple">Purple</option>
                            <option value="cyan">Cyan</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Create Game</button>
            </form>
        </div>

        <div class="game-main" id="gameMain" style="display: none;">
            <div class="sidebar">
                <div class="panel">
                    <h3>Your Empire</h3>
                    <div id="empireInfo"></div>
                </div>
                <div class="panel">
                    <h3>Resources</h3>
                    <div id="resourcesInfo"></div>
                </div>
                <div class="panel">
                    <h3>Victory Progress</h3>
                    <div id="victoryProgress"></div>
                </div>
            </div>

            <div class="galaxy-view">
                <div class="galaxy-header">
                    <h3>Galaxy Map</h3>
                    <div class="map-controls">
                        <button id="zoomIn">+</button>
                        <button id="zoomOut">-</button>
                    </div>
                </div>
                <div class="galaxy-map" id="galaxyMap"></div>
            </div>

            <div class="sidebar">
                <div class="panel">
                    <h3>Fleet Commands</h3>
                    <div class="action-panel">
                        <select id="actionType">
                            <option value="MOVE_FLEET">Move Fleet</option>
                            <option value="COLONIZE_PLANET">Colonize Planet</option>
                            <option value="BUILD_STRUCTURE">Build Structure</option>
                            <option value="CONSTRUCT_SHIP">Construct Ship</option>
                            <option value="START_RESEARCH">Start Research</option>
                            <option value="ESTABLISH_TRADE_ROUTE">Establish Trade Route</option>
                        </select>
                        <select id="sourceSelect"></select>
                        <select id="targetSelect"></select>
                        <button id="addActionBtn" class="btn-small">Add Action</button>
                    </div>
                    <div id="pendingActions"></div>
                </div>
                <div class="panel">
                    <h3>Actions Queue</h3>
                    <div id="actionsQueue"></div>
                    <button id="submitTurnBtn" class="btn-primary">Submit Turn</button>
                </div>
            </div>
        </div>

        <div class="feedback-panel" id="feedbackPanel" style="display: none;">
            <h3>Turn Results</h3>
            <div id="turnResults"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
